name: bible_sumone
description: 크리스천 커플을 위한 성경 나눔 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Functional Programming
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1

  # OAuth
  google_sign_in: ^6.2.1

  # 라우팅
  go_router: ^14.0.0

  # Backend (Supabase)
  supabase_flutter: ^2.5.0

  # HTTP 클라이언트
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # 로컬 저장소
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 로컬 알림 (Phase 5.1)
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2  # 로컬 알림 스케줄링용

  # UI/UX
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  confetti: ^0.7.0  # 마일스톤 축하 애니메이션

  # 유틸리티
  intl: ^0.19.0  # 날짜 포맷팅
  url_launcher: ^6.2.2  # 외부 링크
  share_plus: ^7.2.1  # 공유 기능
  image_picker: ^1.0.7  # 프로필 사진

  # 로깅 & 디버깅
  logger: ^2.0.2

  # 환경 변수
  flutter_dotenv: ^5.1.0

  # 아이콘
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 린트
  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.11
  hive_generator: ^2.0.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1

  # 테스트
  mockito: ^5.4.4
  http: ^1.2.0  # Bible API 테스트용

  # 에셋 자동 생성
  flutter_gen_runner: ^5.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/bible.json  # 한글 성경 JSON (4.9MB)
    - .env

